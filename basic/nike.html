<html>
    <head>
        <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
        <style>
            .p1{
                color:rgb(0,113,133);
                font-size:20px;
                font-weight: bold;
                text-decoration: underline;
                transition: color 0.15s;
                cursor: pointer;
            }

            .p1:hover{
                color: rgb(95, 99, 103);
            }

            .p2{
                color:rgb(18, 19, 19);
                font-size:40px;
                font-weight: bold;
            }

            .p3{
                color:rgb(0,118,0);
                font-size:20px;
                font-weight: bold;
            }

            .p4{
                color:rgb(13, 13, 13);
                font-size:20px;
            }

            .ADD{
                background-color: rgb(255, 247, 0);
                color:rgb(0, 0, 0);
                font-size: 20px;
                padding-left: 25px;
                padding-right: 25px;
                padding-bottom: 15px;
                padding-top: 15px;
                border-radius:25px;
                border: 1px solid rgb(255, 247, 0);
                cursor:pointer;
                margin-right: 3Normally 30px;
                transition:all 0.15s;
                margin-right: 10px;
            }

            .ADD:hover{
                background-color:rgba(237, 233, 6, 0.913);
                color: rgb(9, 9, 9);
                border: 1px solid rgb(223, 220, 43);
                box-shadow: 5px 5px 10px rgba(9, 9, 9, 0.15);
            }

            .ADD:active{
                transform: translateY(5px);
                margin-bottom: 0px;
                margin-top:0px;
                margin-left:0px;
            }

            .BUY{
                background-color: rgb(232, 123, 7);
                color:rgb(255, 255, 255);
                font-size: 20px;
                height: 50px;
                width: 150px;
                border-radius:25px;
                border: 1px solid rgb(232, 123, 7);
                cursor:pointer;
                transition:all 0.15s;
            }

            .BUY:hover{
                background-color: rgb(215, 116, 9);
                color:rgb(255, 255, 255);
                border: 1px solid rgb(215, 116, 9);
                box-shadow: 5px 5px 10px rgba(9, 9, 9, 0.15);
            }

            .BUY:active{ 
                margin-bottom: 0px;
                margin-top:0px;
                margin-left:0px;
            }
        </style>
    </head>
    <body>
        <a class="p1" href="https://www.amazon.in/..." target="_blank">
            Back to Amazon
        </a>
        
        <p class="p2">Nike black running shoes</p>
        <p class="p3">$129.99 - In stock</p>
        <p class="p4">Free delivery tomorrow</p>

        <button class="ADD">Add to Cart</button>
        <button class="BUY">Buy Now</button>
    </body>
</html>
